name: CI

on:
  push:
    branches: [ master ]
    paths: [src/**]
  pull_request:
    branches: [ master ]
    paths: [src/**]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta, nightly]
        exclude:
          # Exclude nightly on Windows to reduce CI time, or include if needed
          - os: windows-latest
            rust: nightly
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
    - name: Check
      run: cargo check
    - name: Test
      run: cargo test
    - name: Test Release
      run: cargo test --release
    - name: Test with set
      run: cargo test --features set
    - name: Test Release with set
      run: cargo test --release --features set
    - name: Test with alloc
      run: cargo test --features alloc
    - name: Test Release with alloc
      run: cargo test --release --features alloc
    - name: Test with set and alloc
      run: cargo test --features "set alloc"
    - name: Test Release with set and alloc
      run: cargo test --release --features "set alloc"
    - name: Test with atomic
      run: cargo test --features atomic
    - name: Test Release with atomic
      run: cargo test --release --features atomic
    - name: Test with set and atomic
      run: cargo test --features "set atomic"
    - name: Test Release with set and atomic
      run: cargo test --release --features "set atomic"